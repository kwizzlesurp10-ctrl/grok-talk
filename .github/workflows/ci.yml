name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fusionpanda-dist
          path: |
            index.html
            app.js
            styles.css
            fusionpanda.webmanifest
            icon.svg
